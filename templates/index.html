<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Agent - Day 1</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="header-card">
      <div class="challenge-title">Voice Agent Development</div>
      <div class="day-subtitle">Day 3/30 Complete ✅</div>
    </div>

    <div class="main-card">
      <div class="status-title">Ready to Generate 🚀</div>

      <div class="tts-section">
        <input
          type="text"
          id="ttsInput"
          placeholder="Enter text to generate audio"
          class="tts-input"
        />
        <button class="action-btn" onclick="submitText()">
          Generate Audio
        </button>
        <audio id="audioPlayer" controls></audio>
        </audio>
      </div>

      <div class="tech-stack">
        <div class="tech-title">Technology Stack</div>
        <div class="tech-items">
          <span class="tech-item">FastAPI</span>
          <span class="tech-item">HTML5</span>
          <span class="tech-item">CSS3</span>
          <span class="tech-item">JavaScript</span>
        </div>
      </div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
