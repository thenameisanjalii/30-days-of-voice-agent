<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Voice Agent</title>
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>&#129302; AI Voice Agent</h1>
            <p>Let's have a natural conversation</p>
        </header>

        <div class="chat-container">
            <div class="chat-history" id="chatHistory">
                <!-- Conversation cards will appear here -->
            </div>
        </div>

        <div class="controls">
            <button id="recordBtn" class="record-btn">
                <span class="btn-icon">&#127908;</span>
                <span class="btn-text">Start Recording</span>
            </button>
        </div>

        <audio id="echoAudio" style="display: none" autoplay></audio>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
