<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Agent - Day 5</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    
    <!-- Text-to-Speech Section -->
    <div class="feature-card">
      <h2>🎵 Text-Hello. How are you? I'm also fine. to-Speech</h2>
      <div class="tts-section">
        <input
          type="text"
          id="ttsInput"
          placeholder="Enter text to generate audio"
          class="tts-input"
        />
        <button class="action-btn" onclick="submitText()">
          Generate Audio
        </button>
        <audio id="audioPlayer" controls style="display:none"></audio>
      </div>
    </div>

    <!-- Echo Bot Section -->
    <div class="feature-card">
      <h2>🎤 Echo Bot</h2>
      <div class="echo-section">
        <button id="startBtn">Start Recording</button>
        <button id="stopBtn" disabled>Stop Recording</button>
        <audio id="echoAudio" controls style="display:none"></audio>
      </div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
